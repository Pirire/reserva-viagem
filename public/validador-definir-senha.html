<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>REALMETROPOLIS — Activar Conta Validador</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,900&display=swap" rel="stylesheet"/>
<style>
:root{--ok:#1fc97d;--bad:#f05050;--line:rgba(200,210,225,.14);--line2:rgba(200,210,225,.22);--silver:#cdd2da;--silver-2:#8a939f;--silver-3:#545d68}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100vh;font-family:'DM Sans',system-ui,sans-serif;background:linear-gradient(160deg,#07080b 0%,#010103 100%);color:var(--silver);-webkit-font-smoothing:antialiased;display:flex;align-items:center;justify-content:center;padding:24px 16px}
.card{width:100%;max-width:420px;background:rgba(11,13,17,.98);border:1px solid var(--line2);border-radius:24px;overflow:hidden;box-shadow:0 36px 72px rgba(0,0,0,.7)}
.card-head{padding:26px 28px 20px;border-bottom:1px solid var(--line);text-align:center;background:linear-gradient(180deg,rgba(212,216,223,.03) 0%,transparent 100%)}
.brand{display:inline-flex;align-items:center;gap:12px;margin-bottom:16px}
.rm{width:36px;height:36px;border-radius:50%;border:2px solid rgba(212,216,223,.65);background:linear-gradient(145deg,rgba(255,255,255,.10),rgba(255,255,255,.03));box-shadow:0 0 0 4px rgba(212,216,223,.08),inset 0 1px 0 rgba(255,255,255,.16);display:grid;place-items:center;font-size:11px;font-weight:900;color:#fff;letter-spacing:.06em}
.brand-name{font-size:11px;font-weight:700;letter-spacing:.18em;color:var(--silver-2);text-transform:uppercase}
.card-title{font-size:18px;font-weight:900;color:#fff;margin-bottom:5px}
.card-sub{font-size:12px;color:var(--silver-3)}
.card-body{padding:24px 28px 28px;display:flex;flex-direction:column;gap:14px}
.field label{display:block;font-size:10px;font-weight:700;color:var(--silver-3);letter-spacing:.12em;text-transform:uppercase;margin-bottom:6px}
input{width:100%;height:46px;border-radius:12px;border:1px solid var(--line2);background:rgba(255,255,255,.04);color:#e8eaed;padding:0 14px;font-size:13px;font-weight:500;font-family:inherit;outline:none;transition:border-color .15s,box-shadow .15s}
input:focus{border-color:rgba(212,216,223,.40);box-shadow:0 0 0 3px rgba(212,216,223,.07)}
input::placeholder{color:var(--silver-3)}
.btn{width:100%;height:50px;border-radius:14px;border:none;background:linear-gradient(135deg,#d4d8e0,#a8adb8,#e0e4ec);background-size:200% 100%;background-position:0% 50%;color:#08090c;font-size:12px;font-weight:900;letter-spacing:.10em;cursor:pointer;transition:.2s ease;font-family:inherit;box-shadow:0 4px 20px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.7)}
.btn:hover{background-position:100% 50%;transform:translateY(-1px)}
.btn:active{transform:scale(.98)}
.btn:disabled{opacity:.3;cursor:not-allowed;transform:none}
.msg{padding:10px 14px;border-radius:11px;font-size:12px;font-weight:600;display:none;line-height:1.4}
.msg.ok{display:block;background:rgba(31,201,125,.07);border:1px solid rgba(31,201,125,.22);color:#86efac}
.msg.err{display:block;background:rgba(240,80,80,.07);border:1px solid rgba(240,80,80,.22);color:#fca5a5}
.success{display:none;text-align:center;padding:8px 0}
.success.show{display:block}
.success-icon{font-size:48px;margin-bottom:12px}
.success-title{font-size:17px;font-weight:900;color:#fff;margin-bottom:8px}
.success-sub{font-size:13px;color:var(--silver-3);line-height:1.6}
</style>
</head>
<body>
<div class="card">
  <div class="card-head">
    <div class="brand">
      <div class="rm">RM</div>
      <span class="brand-name">Realmetropolis</span>
    </div>
    <div class="card-title">Activar Conta</div>
    <div class="card-sub">Defina a sua senha para aceder ao painel de validador</div>
  </div>
  <div class="card-body">
    <div class="msg" id="msg"></div>

    <div id="formWrap">
      <div style="display:flex;flex-direction:column;gap:14px">
        <div class="field">
          <label>Email</label>
          <input id="email" type="email" placeholder="O seu email" autocomplete="email"/>
        </div>
        <div class="field">
          <label>Nova Senha</label>
          <input id="senha" type="password" placeholder="Mínimo 6 caracteres" autocomplete="new-password"/>
        </div>
        <div class="field">
          <label>Confirmar Senha</label>
          <input id="senha2" type="password" placeholder="Repetir senha" autocomplete="new-password"/>
        </div>
      </div>
      <div style="margin-top:14px">
        <button class="btn" id="btnActivar">ACTIVAR CONTA</button>
      </div>
    </div>

    <div class="success" id="success">
      <div class="success-icon">✅</div>
      <div class="success-title">Conta Activada</div>
      <div class="success-sub">A sua conta foi activada com sucesso.<br>Pode agora fazer login no painel de validador.</div>
      <div style="margin-top:18px">
        <a href="/validador-login.html" style="display:block;height:46px;border-radius:12px;background:rgba(255,255,255,.07);border:1px solid var(--line2);color:var(--silver);font-size:12px;font-weight:700;letter-spacing:.08em;text-decoration:none;display:flex;align-items:center;justify-content:center">IR PARA O LOGIN</a>
      </div>
    </div>
  </div>
</div>

<script>
'use strict';
const token = new URLSearchParams(location.search).get('token') || '';
const API   = location.origin;

function setMsg(tipo, txt) {
  const el = document.getElementById('msg');
  el.textContent = txt;
  el.className = 'msg ' + tipo;
}

if (!token) {
  setMsg('err', 'Link inválido. Solicite um novo convite ao administrador.');
  document.getElementById('btnActivar').disabled = true;
}

document.getElementById('btnActivar').addEventListener('click', async () => {
  const email  = document.getElementById('email').value.trim();
  const senha  = document.getElementById('senha').value;
  const senha2 = document.getElementById('senha2').value;

  if (!email)         { setMsg('err', 'Email obrigatório.'); return; }
  if (senha.length < 6) { setMsg('err', 'A senha deve ter pelo menos 6 caracteres.'); return; }
  if (senha !== senha2) { setMsg('err', 'As senhas não coincidem.'); return; }

  const btn = document.getElementById('btnActivar');
  btn.disabled = true;
  btn.textContent = 'A activar…';
  setMsg('', '');

  try {
    const res  = await fetch(`${API}/api/validadores/definir-senha`, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ token, email, senha }),
    });
    const data = await res.json().catch(() => ({}));

    if (!res.ok) throw new Error(data.message || `Erro ${res.status}`);

    document.getElementById('formWrap').style.display = 'none';
    document.getElementById('success').classList.add('show');
  } catch (err) {
    setMsg('err', '❌ ' + (err.message || 'Erro ao activar a conta.'));
    btn.disabled = false;
    btn.textContent = 'ACTIVAR CONTA';
  }
});

// Enter para submeter
document.querySelectorAll('input').forEach(el =>
  el.addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('btnActivar').click(); })
);
</script>
</body>
</html>
