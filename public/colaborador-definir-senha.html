<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>REALMETROPOLIS — Activar Conta</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Arial,system-ui,sans-serif;}
html,body{height:100%;background:linear-gradient(135deg,#050507,#0d0f12);color:#d9dde3;}
body{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
.card{
  width:min(420px,96vw);
  background:linear-gradient(180deg,#0e1012,#08090b);
  border:1px solid rgba(196,201,212,.15);
  border-radius:20px;padding:32px 28px;
  box-shadow:0 30px 80px rgba(0,0,0,.7);
}
.brand{display:flex;align-items:center;gap:12px;margin-bottom:26px;}
.rm{width:42px;height:42px;border-radius:50%;border:1.5px solid rgba(196,201,212,.35);
    display:grid;place-items:center;font-size:11px;font-weight:900;color:#c4c9d4;flex-shrink:0;}
.brand h1{font-size:13px;font-weight:700;color:#c4c9d4;letter-spacing:.2em;}
h2{font-size:20px;font-weight:700;color:#fff;margin-bottom:6px;}
.sub{font-size:12px;color:#5f6874;margin-bottom:22px;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:#434a55;margin-bottom:6px;}
.field input{
  width:100%;height:48px;padding:0 14px;
  background:#0d1014;border:1.5px solid rgba(196,201,212,.12);border-radius:12px;
  color:#f0f2f5;font-size:14px;outline:none;transition:.18s;
}
.field input:focus{border-color:rgba(196,201,212,.4);box-shadow:0 0 0 3px rgba(196,201,212,.05);}
.field input::placeholder{color:#2c3340;}
.toggle-pwd{
  display:block;text-align:right;margin-top:-8px;margin-bottom:12px;
  font-size:11px;color:#434a55;cursor:pointer;transition:color .15s;user-select:none;
}
.toggle-pwd:hover{color:#8b95a2;}
.btn{
  width:100%;height:48px;border:none;border-radius:13px;
  background:linear-gradient(180deg,#e0e4ea,#bec6d1);
  color:#07080a;font-weight:900;font-size:13px;
  letter-spacing:.08em;text-transform:uppercase;
  cursor:pointer;transition:all .18s;
  box-shadow:0 4px 16px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.6);
}
.btn:hover{filter:brightness(1.04);transform:translateY(-1px);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.msg{margin-top:14px;padding:12px 14px;border-radius:11px;font-size:13px;font-weight:600;display:none;}
.msg.ok{display:block;background:rgba(25,214,139,.07);border:1px solid rgba(25,214,139,.2);color:#7fffc4;}
.msg.err{display:block;background:rgba(255,80,80,.07);border:1px solid rgba(255,80,80,.2);color:#ff9999;}
.loader{display:none;margin:16px auto 0;width:24px;height:24px;border:2px solid rgba(196,201,212,.15);
        border-top-color:#c4c9d4;border-radius:50%;animation:spin .6s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div class="card">
  <div class="brand">
    <div class="rm">RM</div>
    <h1>REALMETROPOLIS</h1>
  </div>
  <h2>Activar Conta</h2>
  <div class="sub" id="hint">A verificar link de activação…</div>

  <div id="formArea" style="display:none">
    <div class="field">
      <label>Nova senha</label>
      <input type="password" id="senha" placeholder="Mínimo 6 caracteres" autocomplete="new-password">
    </div>
    <div class="field">
      <label>Confirmar senha</label>
      <input type="password" id="confirmar" placeholder="Repetir senha" autocomplete="new-password">
    </div>
    <span class="toggle-pwd" id="togglePwd">Mostrar senha</span>
    <button class="btn" id="btnActivar">ACTIVAR CONTA</button>
    <div class="loader" id="loader"></div>
    <div class="msg" id="msg"></div>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════════
// CONFLITO RESOLVIDO:
//   Era: "const API" e "const token" declarados 2x → SyntaxError
//   Agora: declarados UMA única vez no topo do script
// ════════════════════════════════════════════════════════

const API   = location.origin;
const token = new URLSearchParams(location.search).get('token') || '';

const hint     = document.getElementById('hint');
const formArea = document.getElementById('formArea');
const msgEl    = document.getElementById('msg');
const loader   = document.getElementById('loader');
const btn      = document.getElementById('btnActivar');

// ── Validar token e mostrar formulário ──────────────────
if (!token) {
  hint.textContent = '❌ Link inválido ou expirado.';
} else {
  const parts = token.split('.');

  if (parts.length === 3) {
    // JWT — verificar expiração no cliente antes de mostrar form
    try {
      const padding  = parts[1].length % 4 === 0 ? '' : '='.repeat(4 - (parts[1].length % 4));
      const payload  = JSON.parse(atob(parts[1].replace(/-/g, '+').replace(/_/g, '/') + padding));
      const expirado = payload.exp && payload.exp * 1000 < Date.now();

      if (expirado) {
        hint.textContent = '❌ Link expirado. Contacte o administrador.';
      } else {
        hint.textContent = 'Defina a sua senha para activar a conta.';
        formArea.style.display = '';
      }
    } catch {
      hint.textContent = '❌ Token inválido.';
    }
  } else {
    // Token opaco (não JWT) — mostrar form e deixar o servidor validar
    hint.textContent = 'Defina a sua senha para activar a conta.';
    formArea.style.display = '';
  }
}

// ── Toggle mostrar/ocultar senha ────────────────────────
document.getElementById('togglePwd').onclick = () => {
  const s    = document.getElementById('senha');
  const c    = document.getElementById('confirmar');
  const t    = document.getElementById('togglePwd');
  const show = s.type === 'password';
  s.type     = show ? 'text' : 'password';
  c.type     = show ? 'text' : 'password';
  t.textContent = show ? 'Ocultar senha' : 'Mostrar senha';
};

function showMsg(type, text) {
  msgEl.className   = 'msg ' + type;
  msgEl.textContent = text;
}

// ── Activar conta ───────────────────────────────────────
btn.onclick = async () => {
  const senha     = document.getElementById('senha').value;
  const confirmar = document.getElementById('confirmar').value;

  if (senha.length < 6)      { showMsg('err', 'A senha deve ter pelo menos 6 caracteres.'); return; }
  if (senha !== confirmar)   { showMsg('err', 'As senhas não coincidem.'); return; }

  btn.disabled          = true;
  loader.style.display  = 'block';
  msgEl.className       = 'msg';

  // Endpoints por ordem de prioridade
  const endpoints = [
    `${API}/api/admin/parceiros/definir-senha`,
    `${API}/api/colaboradores/definir-senha`,
    `${API}/api/admin/colaboradores/definir-senha`,
  ];

  let sucesso   = false;
  let ultimoErro = 'Erro ao activar conta.';

  for (const ep of endpoints) {
    try {
      const res  = await fetch(ep, {
        method:      'POST',
        headers:     { 'Content-Type': 'application/json' },
        credentials: 'include',
        body:        JSON.stringify({ token, senha }),
      });
      const data = await res.json().catch(() => ({}));

      if (res.ok) { sucesso = true; break; }
      ultimoErro = data?.message || ultimoErro;
    } catch {
      // endpoint não disponível — tentar o próximo
      continue;
    }
  }

  loader.style.display = 'none';

  if (sucesso) {
    showMsg('ok', '✅ Conta activada! A redirecionar…');
    setTimeout(() => { window.location.href = '/gestor-frota-login.html'; }, 1800);
  } else {
    showMsg('err', ultimoErro);
    btn.disabled = false;
  }
};

// ── Enter para submeter ─────────────────────────────────
['senha', 'confirmar'].forEach(id =>
  document.getElementById(id)?.addEventListener('keydown', e => { if (e.key === 'Enter') btn.click(); })
);
</script>
</body>
</html>
