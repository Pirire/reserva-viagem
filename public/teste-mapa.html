<!DOCTYPE html>
<html>
<head><meta charset="UTF-8">
<style>
  #map { position:fixed; inset:0; }
</style>
</head>
<body>
  <div id="map"></div>
  <script>
    function initMap() {
      new google.maps.Map(document.getElementById('map'), {
        center: { lat: 38.7169, lng: -9.1393 },
        zoom: 13
      });
      console.log('✅ Mapa OK');
    }
  </script>
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBJ6XoeSWUFGWFwPPgOQXZA1zfGpy1ECTg&callback=initMap" async defer></script>
</body>
</html>
