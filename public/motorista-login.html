<!doctype html>
<html lang="pt">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Login Motorista</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,900&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#09090c;--c2:#0d0f12;--c3:#141619;
  --silver:#cdd2da;--silver-2:#8a939f;--silver-3:#545d68;
  --line:rgba(200,210,225,.10);--line2:rgba(200,210,225,.20);
  --ok:#1fc97d;--bad:#f05050;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{
  min-height:100vh;font-family:'DM Sans',system-ui,sans-serif;
  background:var(--bg);color:var(--silver);-webkit-font-smoothing:antialiased;
  display:flex;align-items:center;justify-content:center;padding:20px;
  background:
    radial-gradient(ellipse 70% 50% at 50% -10%,rgba(212,216,223,.04),transparent),
    linear-gradient(170deg,#06070a 0%,#010103 100%);
}
.card{
  width:100%;max-width:400px;
  background:rgba(11,13,17,.98);
  border:1px solid var(--line2);
  border-radius:24px;
  box-shadow:0 36px 72px rgba(0,0,0,.7),0 0 0 1px rgba(255,255,255,.03),inset 0 1px 0 rgba(255,255,255,.04);
  overflow:hidden;
}
/* ── HEAD ── */
.card-head{
  padding:28px 28px 22px;
  border-bottom:1px solid var(--line);
  text-align:center;
  background:linear-gradient(180deg,rgba(212,216,223,.03) 0%,transparent 100%);
}
.brand{display:inline-flex;align-items:center;gap:12px;margin-bottom:18px}
.rm-circle{
  width:38px;height:38px;border-radius:50%;flex-shrink:0;
  border:2px solid rgba(212,216,223,.65);
  background:linear-gradient(145deg,rgba(255,255,255,.10),rgba(255,255,255,.03));
  box-shadow:0 0 0 4px rgba(212,216,223,.08),0 2px 8px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.16);
  display:grid;place-items:center;
  font-size:11px;font-weight:900;color:#fff;letter-spacing:.06em;
}
.brand-name{
  font-size:11px;font-weight:700;letter-spacing:.18em;
  color:var(--silver-2);text-transform:uppercase;
}
.card-title{font-size:19px;font-weight:900;color:#fff;letter-spacing:.02em;margin-bottom:5px}
.card-sub{font-size:12px;color:var(--silver-3)}
/* ── BODY ── */
.card-body{padding:22px 26px 26px;display:flex;flex-direction:column;gap:12px}
/* ── LABELS / INPUTS ── */
label{
  display:block;font-size:10px;font-weight:700;
  color:var(--silver-3);letter-spacing:.12em;text-transform:uppercase;margin-bottom:5px;
}
input{
  width:100%;height:46px;border-radius:12px;
  border:1px solid var(--line2);background:rgba(255,255,255,.04);
  color:#e8eaed;padding:0 14px;
  font-size:13px;font-weight:500;font-family:inherit;
  outline:none;transition:border-color .15s,box-shadow .15s;
}
input:focus{
  border-color:rgba(212,216,223,.40);
  box-shadow:0 0 0 3px rgba(212,216,223,.07);
}
input::placeholder{color:var(--silver-3)}
/* ── MSG ── */
#msg{
  padding:10px 14px;border-radius:11px;font-size:12px;font-weight:600;
  display:none;line-height:1.4;
}
#msg.ok{background:rgba(31,201,125,.07);border:1px solid rgba(31,201,125,.22);color:#86efac}
#msg.error{background:rgba(240,80,80,.07);border:1px solid rgba(240,80,80,.22);color:#fca5a5}
/* ── BTN ── */
button#btnLogin{
  width:100%;height:50px;border:none;border-radius:14px;
  background:linear-gradient(135deg,#d4d8e0,#a8adb8,#e0e4ec);
  background-size:200% 100%;background-position:0% 50%;
  color:#08090c;font-size:12px;font-weight:900;letter-spacing:.10em;
  cursor:pointer;transition:.2s ease;font-family:inherit;
  box-shadow:0 4px 20px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.7);
}
button#btnLogin:hover{background-position:100% 50%;transform:translateY(-1px);box-shadow:0 6px 28px rgba(0,0,0,.6)}
button#btnLogin:active{transform:scale(.98)}
button#btnLogin:disabled{opacity:.3;cursor:not-allowed;transform:none}
/* ── LINKS ── */
.divider{height:1px;background:linear-gradient(90deg,transparent,var(--line2),transparent)}
.links{display:flex;justify-content:space-between;align-items:center}
.links a{
  font-size:11px;color:var(--silver-3);text-decoration:none;cursor:pointer;transition:color .15s;
}
.links a:hover{color:var(--silver)}
</style>
</head>
<body>
<div class="card">
  <div class="card-head">
    <div class="brand">
      <div class="rm-circle">RM</div>
      <span class="brand-name">Realmetropolis</span>
    </div>
    <div class="card-title">Área do Motorista</div>
    <div class="card-sub">Acesso exclusivo para motoristas da frota</div>
  </div>
  <div class="card-body">
    <div id="msg"></div>
    <div>
      <label>Email</label>
      <input id="email" type="email" placeholder="email@empresa.com" autocomplete="email" autofocus/>
    </div>
    <div>
      <label>Senha</label>
      <input id="senha" type="password" placeholder="••••••••" autocomplete="current-password"/>
    </div>
    <button id="btnLogin" type="button">ENTRAR</button>
    <div class="divider"></div>
    <div class="links">
      <a id="togglePwd">Mostrar senha</a>
      <a id="clearSession">Limpar sessão</a>
    </div>
  </div>
</div>
<script src="/js/motorista-login.js"></script>
</body>
</html>
